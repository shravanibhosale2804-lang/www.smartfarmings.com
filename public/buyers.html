<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriConnect - Buyer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

/* Reset & Body */
body, html {
  margin:0;
  padding:0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  background: url('vege.webp') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Overlay to dim background for contrast */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.3);
  top: 0;
  left: 0;
  z-index: 0;
}

/* Container */
.container {
  background: #ffffffdd;
  padding: 40px 30px;
  border-radius: 20px;
  text-align: center;
  max-width: 500px;
  width: 90%;
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
  position: relative;
  z-index: 1;
}

/* Logo */
.logo {
  font-size: 60px;
  margin-bottom: 20px;
  animation: floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Heading & Text */
h1 {
  font-size: 28px;
  color: #2e7d32;
  margin-bottom: 15px;
}

p {
  font-size: 16px;
  color: #388e3c;
  margin-bottom: 30px;
  line-height: 1.5;
}

/* Button */
.btn {
  padding: 15px 30px;
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  background: linear-gradient(90deg, #43a047, #2e7d32);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: 0.3s;
  text-decoration: none;
  display: inline-block;
}

.btn:hover {
  background: linear-gradient(90deg, #2e7d32, #1b5e20);
  transform: translateY(-2px);
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">🌿</div>
  <h1>Buy Fresh Vegetables & Fruits</h1>
  <p>Connect directly with farmers and explore fresh produce, market prices, and special offers.</p>
  
  <!-- Button to open Kissan Connect website -->
  <a href="https://www.kisankonnect.in/aboutus" target="_blank" class="btn">buy from here...!!</a>
</div>

</body>
</html>
