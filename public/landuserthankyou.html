<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - AgriConnect</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    /* Full page background image */
    background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
    background-size: cover;
  }

  .thankyou-card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 50px 40px;
    width: 90%;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
    animation: fadeIn 1s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  h1 {
    font-size: 2.2rem;
    margin-bottom: 20px;
    color: #2e7d32; /* leaf green */
  }

  p {
    font-size: 1rem;
    color: #555;
    margin-bottom: 15px;
  }

  .leaf-decor {
    position: absolute;
    width: 60px;
    height: 60px;
    background: url('https://img.icons8.com/ios-filled/100/2e7d32/leaf.png') no-repeat center center;
    background-size: contain;
    opacity: 0.2;
  }

  .leaf-decor.top-left { top: -10px; left: -10px; transform: rotate(-15deg); }
  .leaf-decor.top-right { top: -10px; right: -10px; transform: rotate(20deg); }
  .leaf-decor.bottom-left { bottom: -10px; left: -10px; transform: rotate(10deg); }
  .leaf-decor.bottom-right { bottom: -10px; right: -10px; transform: rotate(-20deg); }

  button {
    padding: 14px 30px;
    background: linear-gradient(135deg, #2e7d32, #56ab2f);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

</style>
</head>
<body>

<div class="thankyou-card">
  <div class="leaf-decor top-left"></div>
  <div class="leaf-decor top-right"></div>
  <div class="leaf-decor bottom-left"></div>
  <div class="leaf-decor bottom-right"></div>

  <h1>Thank You!</h1>
  <p>Thank you for your interest in AgriConnect.</p>
  <p>We have received your request and our team will contact you shortly.</p>
  <p>Explore our platform to find the best lands and opportunities tailored for you!</p>
  <button onclick="explore()">Explore</button>
</div>

<script>
function explore() {
  window.location.href = "explore.html"; // redirect to main page
}
</script>

</body>
</html>
