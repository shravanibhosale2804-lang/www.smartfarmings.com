<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriConnect - Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

  /* Body and background */
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #a5d6a7, #66bb6a);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Animated floating circles in background */
  body::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 150%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 50%);
    animation: float 20s linear infinite;
    z-index: 0;
  }

  @keyframes float {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-50px) rotate(180deg); }
    100% { transform: translateY(0) rotate(360deg); }
  }

  /* Login container card */
  .login-container {
    position: relative;
    background: #fff;
    padding: 50px 35px;
    border-radius: 20px;
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
    text-align: center;
    width: 350px;
    z-index: 1;
    transform: scale(0.9);
    animation: zoomIn 0.6s forwards;
  }

  @keyframes zoomIn {
    to { transform: scale(1); }
  }

  /* Logo */
  .logo {
    font-size: 50px;
    margin-bottom: 20px;
    animation: bounce 1.5s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .login-container h1 {
    margin-bottom: 25px;
    color: #2d6a4f;
    font-weight: 600;
  }

  .login-container input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
    transition: border 0.3s, box-shadow 0.3s;
  }

  .login-container input:focus {
    border-color: #2d6a4f;
    box-shadow: 0 0 8px rgba(45,106,79,0.3);
    outline: none;
  }

  .login-container button {
    width: 100%;
    padding: 14px;
    background-color: #2d6a4f;
    color: #fff;
    border: none;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.3s, transform 0.2s;
  }

  .login-container button:hover {
    background-color: #1b4332;
    transform: scale(1.05);
  }

  /* Error message styling */
  #error-message {
    color: red;
    font-size: 0.85em;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #error-message.show {
    opacity: 1;
  }

  /* Signup link */
  .signup-link {
    margin-top: 18px;
    display: inline-block;
    color: #1b4332;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s;
  }

  .signup-link:hover {
    color: #14532d;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">🌱</div>
  <h1>AgriConnect Login</h1>
  <form action="/login" method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <!-- Error message -->
  <div id="error-message"></div>

  <a href="signup.html" class="signup-link">Don't have an account? Signup</a>
</div>

<script>
  // Show error message from query parameter
  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');
  const errorDiv = document.getElementById('error-message');
  if(error) {
    errorDiv.textContent = error;
    errorDiv.classList.add('show');
  }
</script>

</body>
</html>
